name: Build and Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            jpackage_goal: linux

          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            jpackage_goal: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and package
        run: mvn -Pdist package jpackage:jpackage@${{ matrix.jpackage_goal }}

      # ---------- Package output ----------
      - name: Archive
        if: matrix.platform == 'linux'
        shell: pwsh
        run: |
          cd target/output/Nautilus
          tar -czf ../../../nautilus-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz *
          cd ../../..

      # ---------- Upload artifacts ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nautilus-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            nautilus-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            nautilus-linux-x86_64/nautilus-${{ github.ref_name }}-linux-x86_64.tar.gz
            nautilus-linux-arm64/nautilus-${{ github.ref_name }}-linux-arm64.tar.gz